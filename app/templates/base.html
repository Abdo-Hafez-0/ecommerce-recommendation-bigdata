<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}Amazon Reviews DB{% endblock %}</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:       #0a0a0f;
    --surface:  #111118;
    --border:   #1e1e2e;
    --accent:   #f97316;
    --accent2:  #3b82f6;
    --success:  #22c55e;
    --danger:   #ef4444;
    --warning:  #eab308;
    --text:     #e2e8f0;
    --muted:    #64748b;
    --mono:     'IBM Plex Mono', monospace;
    --sans:     'Space Grotesk', sans-serif;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    font-size: 14px;
    min-height: 100vh;
    display: flex;
  }

  /* ── SIDEBAR ── */
  .sidebar {
    width: 220px;
    min-height: 100vh;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    position: fixed;
    top: 0; left: 0;
    z-index: 100;
  }
  .sidebar-logo {
    padding: 24px 20px 20px;
    border-bottom: 1px solid var(--border);
  }
  .sidebar-logo span {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--accent);
    letter-spacing: 2px;
    text-transform: uppercase;
  }
  .sidebar-logo h1 {
    font-size: 15px;
    font-weight: 600;
    margin-top: 4px;
    color: var(--text);
  }
  .sidebar-nav { padding: 16px 0; flex: 1; }
  .nav-section {
    padding: 8px 20px 4px;
    font-size: 10px;
    font-family: var(--mono);
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
  }
  .nav-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 20px;
    color: var(--muted);
    text-decoration: none;
    font-size: 13px;
    font-weight: 500;
    transition: all .15s;
    border-left: 2px solid transparent;
  }
  .nav-item:hover  { color: var(--text); background: rgba(255,255,255,.03); }
  .nav-item.active { color: var(--accent); border-left-color: var(--accent); background: rgba(249,115,22,.06); }
  .nav-icon { font-size: 15px; width: 18px; text-align: center; }

  /* ── MAIN ── */
  .main {
    margin-left: 220px;
    flex: 1;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
  }
  .topbar {
    height: 52px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 28px;
    background: var(--surface);
    position: sticky;
    top: 0;
    z-index: 50;
  }
  .topbar-title { font-weight: 600; font-size: 15px; }
  .topbar-badge {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    background: var(--border);
    padding: 3px 9px;
    border-radius: 20px;
  }
  .content { padding: 28px; flex: 1; }

  /* ── CARDS ── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 20px;
    margin-bottom: 20px;
  }
  .card-title {
    font-size: 12px;
    font-family: var(--mono);
    color: var(--muted);
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 14px;
  }

  /* ── STAT GRID ── */
  .stat-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 16px;
    margin-bottom: 24px;
  }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 18px;
  }
  .stat-label { font-size: 11px; color: var(--muted); font-family: var(--mono); letter-spacing: 1px; text-transform: uppercase; }
  .stat-value { font-size: 28px; font-weight: 700; margin: 6px 0 2px; }
  .stat-value.orange { color: var(--accent); }
  .stat-value.blue   { color: var(--accent2); }
  .stat-value.green  { color: var(--success); }
  .stat-value.red    { color: var(--danger); }

  /* ── TABLE ── */
  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  thead th {
    text-align: left;
    padding: 10px 14px;
    font-family: var(--mono);
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 1px;
    text-transform: uppercase;
    border-bottom: 1px solid var(--border);
    background: var(--bg);
  }
  tbody tr { border-bottom: 1px solid var(--border); transition: background .1s; }
  tbody tr:hover { background: rgba(255,255,255,.025); }
  tbody td { padding: 10px 14px; color: var(--text); vertical-align: middle; }
  .mono { font-family: var(--mono); font-size: 11px; color: var(--muted); }
  .badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 20px;
    font-size: 11px;
    font-family: var(--mono);
    font-weight: 600;
  }
  .badge-green  { background: rgba(34,197,94,.15);  color: var(--success); }
  .badge-red    { background: rgba(239,68,68,.15);   color: var(--danger); }
  .badge-orange { background: rgba(249,115,22,.15);  color: var(--accent); }
  .badge-blue   { background: rgba(59,130,246,.15);  color: var(--accent2); }
  .badge-gray   { background: rgba(100,116,139,.15); color: var(--muted); }

  /* ── BUTTONS ── */
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 7px 14px;
    border-radius: 6px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    border: none;
    transition: all .15s;
    font-family: var(--sans);
    text-decoration: none;
  }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: #ea6c0a; }
  .btn-secondary { background: var(--border); color: var(--text); }
  .btn-secondary:hover { background: #2a2a3e; }
  .btn-danger { background: rgba(239,68,68,.15); color: var(--danger); border: 1px solid rgba(239,68,68,.3); }
  .btn-danger:hover { background: rgba(239,68,68,.25); }
  .btn-success { background: rgba(34,197,94,.15); color: var(--success); border: 1px solid rgba(34,197,94,.3); }
  .btn-sm { padding: 4px 10px; font-size: 12px; }
  .btn-icon { padding: 6px; border-radius: 6px; }

  /* ── FORMS ── */
  .form-group { margin-bottom: 16px; }
  .form-label { display: block; font-size: 12px; font-family: var(--mono); color: var(--muted); margin-bottom: 6px; letter-spacing: .5px; }
  .form-control {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    padding: 9px 12px;
    font-size: 13px;
    font-family: var(--sans);
    outline: none;
    transition: border-color .15s;
  }
  .form-control:focus { border-color: var(--accent); }
  select.form-control option { background: var(--surface); }

  /* ── FILTER BAR ── */
  .filter-bar {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    margin-bottom: 20px;
    align-items: flex-end;
  }
  .filter-bar .form-group { margin-bottom: 0; }
  .filter-bar .form-control { min-width: 160px; }

  /* ── MODAL ── */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.7);
    z-index: 200;
    align-items: center;
    justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 28px;
    width: 520px;
    max-width: 95vw;
    max-height: 85vh;
    overflow-y: auto;
  }
  .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
  .modal-title { font-size: 16px; font-weight: 600; }
  .modal-close { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 20px; padding: 2px 6px; border-radius: 4px; }
  .modal-close:hover { color: var(--text); background: var(--border); }
  .modal-footer { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }

  /* ── TOAST ── */
  #toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 18px;
    font-size: 13px;
    z-index: 9999;
    display: none;
    align-items: center;
    gap: 10px;
    min-width: 220px;
    box-shadow: 0 8px 32px rgba(0,0,0,.4);
    animation: slideUp .2s ease;
  }
  #toast.show { display: flex; }
  #toast.success { border-left: 3px solid var(--success); }
  #toast.error   { border-left: 3px solid var(--danger); }
  @keyframes slideUp { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:none; } }

  /* ── MISC ── */
  .flex { display: flex; }
  .items-center { align-items: center; }
  .gap-2 { gap: 8px; }
  .gap-3 { gap: 12px; }
  .justify-between { justify-content: space-between; }
  .mb-4 { margin-bottom: 16px; }
  .text-muted { color: var(--muted); }
  .text-sm { font-size: 12px; }
  .stars { color: var(--warning); letter-spacing: -1px; }
  .empty-state { text-align: center; padding: 48px; color: var(--muted); }
  .empty-state .icon { font-size: 36px; margin-bottom: 12px; }
  .loading { text-align: center; padding: 32px; color: var(--muted); font-family: var(--mono); font-size: 12px; }
</style>
{% block extra_head %}{% endblock %}
</head>
<body>

<!-- SIDEBAR -->
<aside class="sidebar">
  <div class="sidebar-logo">
    <span>MongoDB</span>
    <h1>Amazon Reviews</h1>
  </div>
  <nav class="sidebar-nav">
    <div class="nav-section">Main</div>
    <a href="/"         class="nav-item {% if request.path=='/' %}active{% endif %}">
      <span class="nav-icon"></span> Dashboard
    </a>

    <div class="nav-section" style="margin-top:8px">Collections</div>
    <a href="/reviews"  class="nav-item {% if '/reviews'  in request.path %}active{% endif %}">
      <span class="nav-icon"></span> Reviews
    </a>
    <a href="/users"    class="nav-item {% if '/users'    in request.path %}active{% endif %}">
      <span class="nav-icon"></span> Users
    </a>
    <a href="/products" class="nav-item {% if '/products' in request.path %}active{% endif %}">
      <span class="nav-icon"></span> Products
    </a>
  </nav>
</aside>

<!-- MAIN -->
<div class="main">
  <div class="topbar">
    <span class="topbar-title">{% block page_title %}Dashboard{% endblock %}</span>
    <span class="topbar-badge">amazon_reviews_db</span>
  </div>
  <div class="content">
    {% block content %}{% endblock %}
  </div>
</div>

<!-- TOAST -->
<div id="toast"></div>

<script>
function toast(msg, type='success') {
  const el = document.getElementById('toast');
  el.className = 'show ' + type;
  el.innerHTML = (type==='success'?'✅':'❌') + ' ' + msg;
  setTimeout(() => el.className = '', 3000);
}
function openModal(id)  { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }
function stars(n) {
  return '★'.repeat(Math.round(n)) + '☆'.repeat(5-Math.round(n));
}
</script>
{% block scripts %}{% endblock %}
</body>
</html>
